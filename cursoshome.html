<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno | São Gotardo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="Logo.png" alt="Logo Autoescola São Gotardo" class="nav-logo">
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="cursoshome.html" class="active">Meus Cursos</a></li>
            <li><a href="javascript:void(0)" onclick="logout()">Sair</a></li>
        </ul>
    </nav>

	<main style="padding: 120px 5% 40px; max-width: 1200px; margin: 0 auto;">
		<h1 class="gradient-text" style="font-size: 2.5rem;">Olá, <span id="displayNome">Aluno</span>!</h1>
		<p style="color: var(--text-dim); margin-bottom: 40px;">Continue seus estudos de onde parou.</p>

		<div id="cursoLiberado" class="hidden">
			<div class="modules-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">
				
				<div id="modulo-1" class="course-card">
					<div class="module-badge">Módulo 01</div>
					<div class="module-image" style="background-image: url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=400'); height: 150px; background-size: cover; background-position: center;"></div>
					<div style="padding: 20px;">
						<h3>Legislação de Trânsito</h3>
						<div style="margin: 15px 0;">
							<div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
								<span>Progresso</span>
								<span id="porcentagemTexto">0%</span>
							</div>
							<div class="progress-track"><div id="barraProgresso" class="progress-fill"></div></div>
						</div>
						<a href="cursos.html?mod=leg" class="btn-send" style="display: block; text-align: center; text-decoration: none;">Acessar Módulo</a>
					</div>
				</div>
				<div id="modulo-2" class="course-card opacity-50" style="pointer-events: none;">
					<div class="module-badge" style="background: #475569;">Módulo 02</div>
					<div class="module-image" style="filter: grayscale(1); background-image: url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=400'); height: 150px; background-size: cover;"></div>
					
					<div style="padding: 20px;">
						<h3 style="color: var(--text-dim);">Direção Defensiva</h3>
						
						<div style="margin: 15px 0;">
							<div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
								<span>Progresso</span>
								<span id="porcentagemDef">0%</span>
							</div>
							<div class="progress-track">
								<div id="barraDef" class="progress-fill" style="width: 0%;"></div>
							</div>
						</div>
						<a href="cursos.html?mod=def" id="btn-modulo-2" class="btn-send" style="display: block; text-align: center; text-decoration: none;">
							<i class="fas fa-lock" id="icon-lock-2"></i> Bloqueado
						</a>
					</div>
				</div>			
			</div>
		</div>

		<div id="cursoBloqueado" class="course-card hidden" style="max-width: 500px; margin: 0 auto;">
			<div style="padding: 40px; text-align: center;">
				<i class="fas fa-lock" style="font-size: 3rem; color: var(--danger); margin-bottom: 20px;"></i>
				<h3>Acesso Restrito</h3>
				<p style="color: var(--text-dim);">O seu acesso geral ao curso ainda não foi liberado pela administração.</p>
			</div>
		</div>
	</main>
    <script src="script.js"></script>
    <script>
        // Lógica de Bloqueio/Liberação
        document.addEventListener('DOMContentLoaded', () => {
            const permissao = localStorage.getItem('permissao_curso');
            const areaLiberada = document.getElementById('cursoLiberado');
            const areaBloqueada = document.getElementById('cursoBloqueado');

            if (permissao === "SIM") {
                areaLiberada.classList.remove('hidden');
                areaBloqueada.classList.add('hidden');
            } else {
                areaLiberada.classList.add('hidden');
                areaBloqueada.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
