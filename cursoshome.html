<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno | São Gotardo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="Logo.png" alt="Logo Autoescola São Gotardo" class="nav-logo">
            <span></span>
        </div>
        <ul class="nav-linksc">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="cursoshome.html" class="active">Cursos</a></li>
			 <li><a href="simulado.html" class="active">Simulados</a></li>
            <li><a href="javascript:void(0)" onclick="logout()">Sair</a></li>
        </ul>
    </nav>

	<main style="padding: 120px 5% 40px; max-width: 1200px; margin: 0 auto;">
		<h1 class="gradient-text" style="font-size: 2.5rem;">Olá, <span id="displayNome">Aluno</span>!</h1>
		<p style="color: var(--text-dim); margin-bottom: 40px;">Continue seus estudos de onde parou.</p>

		<div id="cursoLiberado" class="hidden">
			<div class="course-card" style="max-width: 600px; margin: 0 auto;">
				<div class="module-image" style="background-image: url('fundocurso.png'); height: 200px;">
       				<div class="module-badge">Completo</div>
					<div id="status-badge" class="module-badge">Em Progresso</div>
   				</div>
				<div style="padding: 25px;">
					<h3 style="margin-bottom: 10px;">Curso de Legislação</h3>
					
					<div class="progress-container" style="margin-bottom: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px;">
						<div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
							<span style="font-size: 0.85rem; color: var(--text-dim);">Seu Progresso Total</span>
							<span id="texto-progresso-total" style="font-size: 0.85rem; font-weight: bold; color: var(--primary);">0%</span>
						</div>
						<div class="progress-bar" style="background: #334155; height: 10px; border-radius: 5px; overflow: hidden;">
							<div id="barra-progresso-total" class="progress-fill" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease;"></div>
						</div>
					</div>

					<a href="cursos.html" class="btn-send" style="display: block; text-align: center; text-decoration: none;">
						<i class="fas fa-play"></i> Continuar de onde parei
					</a>
				</div>
			</div>
		</div>
		<div id="cursoBloqueado" class="course-card hidden" style="max-width: 500px; margin: 0 auto;">
			<div style="padding: 40px; text-align: center;">
				<i class="fas fa-lock" style="font-size: 3rem; color: var(--danger); margin-bottom: 20px;"></i>
				<h3>Acesso Restrito</h3>
				<p style="color: var(--text-dim);">O seu acesso geral ao curso ainda não foi liberado pela administração.</p>
			</div>
		</div>
	</main>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Nome do aluno
            const nome = localStorage.getItem('user_name') || 'Aluno';
            const elNome = document.getElementById('displayNome');
            if (elNome) elNome.innerText = nome.split(' ')[0];

            // 2. Bloqueio / Liberação
            const permissao = localStorage.getItem('permissao_curso');
            const areaLiberada = document.getElementById('cursoLiberado');
            const areaBloqueada = document.getElementById('cursoBloqueado');

            if (permissao === "SIM") {
                areaLiberada.classList.remove('hidden');
                areaBloqueada.classList.add('hidden');
            } else {
                areaLiberada.classList.add('hidden');
                areaBloqueada.classList.remove('hidden');
            }

            // 3. Barra de progresso
            const concluidas = JSON.parse(localStorage.getItem('aulas_concluidas')) || [];
            const totalAulas = CURSO_LEGISLACAO.length + CURSO_DIRECAO.length;
            const porc = totalAulas > 0 ? Math.round((concluidas.length / totalAulas) * 100) : 0;

            const textoPorc = document.getElementById('texto-progresso-total');
            const barraPorc = document.getElementById('barra-progresso-total');

            if (textoPorc) textoPorc.innerText = porc + '%';
            if (barraPorc) {
                // Pequeno delay para a animação de largura funcionar
                setTimeout(() => { barraPorc.style.width = porc + '%'; }, 200);
            }

            // 4. Badge de status
            const badge = document.getElementById('status-badge');
            if (badge) {
                if (porc >= 100) {
                    badge.innerText = '✅ Completo';
                    badge.style.background = '#10b981';
                } else if (porc > 0) {
                    badge.innerText = '▶ Em Progresso';
                } else {
                    badge.innerText = '🔒 Não iniciado';
                    badge.style.background = 'rgba(100,100,100,0.7)';
                }
            }
        });
    </script>
</body>
</html>
