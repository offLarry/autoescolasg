<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aulas | São Gotardo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="Logo.png" alt="Logo Autoescola São Gotardo" class="nav-logo">
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="cursoshome.html">← Voltar</a></li>
        </ul>
    </nav>

    <div class="estudo-wrapper">
        <main class="video-main-container">
            <div class="video-wrapper">
                <iframe id="mainVideoPlayer" style="width:100%; height:100%; border:none; display:none;" allow="autoplay"></iframe>
                <div id="videoPlaceholder" style="height:100%; display:flex; align-items:center; justify-content:center; color: var(--text-dim);">
                    Selecione uma aula na lista ao lado
                </div>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 id="lessonTitle">Bem-vindo</h2>
                    <p style="color: var(--text-dim);">Módulo de Legislação</p>
                </div>
                <button id="btnConcluir" onclick="concluirAulaAtiva()" class="btn-send" style="display:none; background: #22c55e;">Concluir Aula ✅</button>
            </div>
        </main>

        <aside class="sidebar-aulas">
            <h3 style="margin-bottom: 20px;">Lista de Aulas</h3>
            <div id="lista-aulas"></div>
        </aside>
    </div>

    <script src="script.js"></script>
    <script>
        
      function renderizarSidebar() {
            const container = document.getElementById('lista-aulas');
            if (!container) return;

            const urlParams = new URLSearchParams(window.location.search);
            const modulo = urlParams.get('mod');
            
            // Pega a lista correta do script.js (LEGISLACAO ou DIRECAO)
            const aulasParaExibir = (modulo === 'def') ? CURSO_DIRECAO : CURSO_LEGISLACAO;
            const concluidas = JSON.parse(localStorage.getItem('aulas_concluidas')) || [];
            
            const subtitulo = document.querySelector('.video-main-container p');
            if (subtitulo) {
                subtitulo.innerText = (modulo === 'def') ? 'Módulo de Direção Defensiva' : 'Módulo de Legislação';
            }

            container.innerHTML = '';

            aulasParaExibir.forEach(aula => {
                const jaFeita = concluidas.includes(aula.id);
                const item = document.createElement('div');
                item.className = `btn-aula ${localStorage.getItem('aula_atual_id') === aula.id ? 'active' : ''}`;
                item.innerHTML = `<span>${jaFeita ? '✅' : '▶'}</span> <strong>${aula.title}</strong>`;
                
                item.onclick = () => {
                    localStorage.setItem('aula_atual_id', aula.id);
                    document.getElementById('videoPlaceholder').style.display = 'none';
                    const player = document.getElementById('mainVideoPlayer');
                    player.style.display = 'block';
                    player.src = aula.url;
                    document.getElementById('lessonTitle').innerText = aula.title;
                    document.getElementById('btnConcluir').style.display = 'block';
                    renderizarSidebar();
                };
                container.appendChild(item);
            });
        }

        // NOVA FUNÇÃO DE CONCLUIR PARA O BOTÃO
        async function concluirAulaAtiva() {
            const idAtual = localStorage.getItem('aula_atual_id');
            if (!idAtual) return alert("Por favor, selecione uma aula primeiro!");

            let concluidas = JSON.parse(localStorage.getItem('aulas_concluidas')) || [];
            
            if (!concluidas.includes(idAtual)) {
                concluidas.push(idAtual);
                localStorage.setItem('aulas_concluidas', JSON.stringify(concluidas));
                
                alert("Presença confirmada ✅");
                
                // Atualiza a lista lateral e o progresso
                renderizarSidebar(); 
                if (typeof atualizarProgressoGeral === 'function') {
                    atualizarProgressoGeral();
                }

                // Sincroniza com sua planilha do Google
                const email = localStorage.getItem('user_email');
                if(email && typeof SHEET_API_URL !== 'undefined') {
                    const totalAulas = 15; // Ajuste para o número total de suas aulas
                    const progressoCalc = Math.round((concluidas.length / totalAulas) * 100);
                    const url = `${SHEET_API_URL}?acao=atualizarProgresso&email=${encodeURIComponent(email)}&progresso=${progressoCalc}`;
                    fetch(url).catch(e => console.log("Erro de sincronização"));
                }
            } else {
                alert("Você já marcou presença nesta aula.");
            }
        }

        window.addEventListener('DOMContentLoaded', renderizarSidebar);
    </script>
</body>
</html>
