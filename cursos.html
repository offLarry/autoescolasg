<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas | São Gotardo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .estudo-wrapper {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            padding: 92px 3% 32px;
            min-height: 100vh;
            align-items: start;
        }
        .video-main-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            position: relative;
            border: 1px solid var(--card-border);
        }
        #mainVideoPlayer { width:100%; height:100%; border:none; display:none; }
        #videoPlaceholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-dim); font-size: 0.95rem;
        }
        #videoPlaceholder i { font-size: 2.5rem; opacity: 0.3; }
        .video-info-bar {
            display: flex; justify-content: space-between;
            align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .video-info-bar h2 { font-size: 1.1rem; font-weight: 700; flex: 1; min-width: 0; }
        .video-info-bar p { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
        #btnConcluir {
            background: #22c55e; color: white; border: none;
            padding: 11px 20px; border-radius: var(--radius-sm);
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
            display: none; white-space: nowrap; transition: var(--transition);
            box-shadow: 0 4px 16px rgba(34,197,94,0.3);
        }
        #btnConcluir:hover { background: #16a34a; transform: translateY(-1px); }

        /* SIDEBAR DESKTOP */
        .sidebar-aulas {
            background: var(--card-bg); border-radius: var(--radius-lg);
            border: 1px solid var(--card-border);
            display: flex; flex-direction: column;
            max-height: calc(100vh - 112px);
            position: sticky; top: 92px; overflow: hidden;
        }
        .sidebar-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--card-border); flex-shrink: 0; }
        .sidebar-header h3 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
        .sidebar-progress { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 6px; }
        .sidebar-progress-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; }
        .sidebar-progress-fill { height:100%; width:0%; background: linear-gradient(90deg, var(--primary), #c084fc); border-radius:10px; transition: width 0.8s ease; }
        .sidebar-lista { overflow-y: auto; padding: 14px; flex: 1; scrollbar-width: thin; scrollbar-color: var(--primary-glow) transparent; }
        .btn-aula {
            background: rgba(255,255,255,0.02); padding: 13px 14px;
            border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer;
            transition: var(--transition); border: 1px solid var(--card-border);
            font-size: 0.85rem; display: flex; align-items: center; gap: 10px; line-height: 1.3;
        }
        .btn-aula .aula-icone {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.05); display: flex;
            align-items: center; justify-content: center; font-size: 0.72rem;
        }
        .btn-aula.concluida .aula-icone { background: rgba(34,197,94,0.15); color: #22c55e; }
        .btn-aula.active { background: rgba(168,85,247,0.1); border-color: var(--primary); }
        .btn-aula.active .aula-icone { background: rgba(168,85,247,0.2); color: var(--primary); }
        .btn-aula:hover { background: rgba(168,85,247,0.06); border-color: rgba(168,85,247,0.2); }

        /* DRAWER MOBILE */
        #drawer-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 1100; backdrop-filter: blur(4px);
        }
        #drawer-aulas {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1200;
            background: #0d1526; border-top: 1px solid var(--card-border);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            max-height: 75vh; display: flex; flex-direction: column;
        }
        #drawer-aulas.aberto { transform: translateY(0); }
        .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
        .drawer-header { padding:16px 20px 12px; border-bottom:1px solid var(--card-border); flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
        .drawer-header h3 { font-size:1rem; font-weight:700; }
        .drawer-close { background:none; border:none; color:var(--text-dim); font-size:1.1rem; cursor:pointer; padding:4px 8px; }
        .drawer-progress { padding:10px 20px; border-bottom:1px solid var(--card-border); flex-shrink:0; }
        .drawer-progress-info { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text-dim); margin-bottom:6px; }
        .drawer-progress-bar { height:4px; background:rgba(255,255,255,0.06); border-radius:10px; overflow:hidden; }
        .drawer-progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#c084fc); border-radius:10px; transition:width 0.8s ease; }
        .drawer-lista { overflow-y:auto; padding:12px; flex:1; }

        /* BARRA INFERIOR MOBILE */
        #mobile-bar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 1000; background: rgba(8,13,26,0.97);
            border-top: 1px solid var(--card-border);
            padding: 10px 16px; gap: 10px; align-items: center;
            backdrop-filter: blur(16px);
        }
        #btnConcluirMobile {
            flex: 1; background: #22c55e; color: white; border: none;
            padding: 13px; border-radius: var(--radius-sm); font-weight: 700;
            font-size: 0.88rem; cursor: pointer; display: none;
            box-shadow: 0 4px 16px rgba(34,197,94,0.3);
        }
        #btnAbrirLista {
            background: var(--primary); color: white; border: none;
            padding: 13px 18px; border-radius: var(--radius-sm); font-weight: 700;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center;
            gap: 8px; white-space: nowrap; box-shadow: 0 4px 16px var(--primary-glow);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .estudo-wrapper {
                grid-template-columns: 1fr;
                padding: 76px 3% 88px;
                min-height: auto; gap: 14px;
            }
            .sidebar-aulas { display: none; }
            #mobile-bar { display: flex; }
            #btnConcluir { display: none !important; }
            .video-main-container { padding: 12px; }
            .video-info-bar h2 { font-size: 0.92rem; }
        }
        @media (min-width: 769px) {
            #mobile-bar { display: none !important; }
            #drawer-aulas { display: none !important; }
            #drawer-overlay { display: none !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="Logo.png" alt="Logo Autoescola São Gotardo" class="nav-logo">
        </div>
        <ul class="nav-linksc">
            <li><a href="cursoshome.html"><i class="fas fa-arrow-left"></i> Voltar</a></li>
        </ul>
    </nav>

    <div class="estudo-wrapper">
        <main class="video-main-container">
            <div class="video-wrapper">
                <iframe id="mainVideoPlayer" allow="autoplay"></iframe>
                <div id="videoPlaceholder">
                    <i class="fas fa-play-circle"></i>
                    <span>Selecione uma aula na lista</span>
                </div>
            </div>
            <div class="video-info-bar">
                <div>
                    <h2 id="lessonTitle">Bem-vindo</h2>
                    <p id="moduloSubtitulo">Módulo de Legislação</p>
                </div>
                <button id="btnConcluir" onclick="concluirAula()">✅ Concluir Aula</button>
            </div>
        </main>

        <aside class="sidebar-aulas">
            <div class="sidebar-header">
                <h3>Lista de Aulas</h3>
                <div class="sidebar-progress">
                    <span>Progresso</span>
                    <span id="sidebar-porc">0%</span>
                </div>
                <div class="sidebar-progress-bar">
                    <div class="sidebar-progress-fill" id="sidebar-barra"></div>
                </div>
            </div>
            <div class="sidebar-lista" id="lista-aulas"></div>
        </aside>
    </div>

    <!-- OVERLAY -->
    <div id="drawer-overlay" onclick="fecharDrawer()"></div>

    <!-- DRAWER MOBILE -->
    <div id="drawer-aulas">
        <div class="drawer-handle"></div>
        <div class="drawer-header">
            <h3>Lista de Aulas</h3>
            <button class="drawer-close" onclick="fecharDrawer()"><i class="fas fa-times"></i></button>
        </div>
        <div class="drawer-progress">
            <div class="drawer-progress-info">
                <span>Progresso</span>
                <span id="drawer-porc">0%</span>
            </div>
            <div class="drawer-progress-bar">
                <div class="drawer-progress-fill" id="drawer-barra"></div>
            </div>
        </div>
        <div class="drawer-lista" id="lista-aulas-mobile"></div>
    </div>

    <!-- BARRA INFERIOR MOBILE -->
    <div id="mobile-bar">
        <button id="btnConcluirMobile" onclick="concluirAula()">✅ Concluir Aula</button>
        <button id="btnAbrirLista" onclick="abrirDrawer()">
            <i class="fas fa-list"></i> Aulas
        </button>
    </div>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modulo = urlParams.get('mod');
        const aulasParaExibir = (modulo === 'def') ? CURSO_DIRECAO : CURSO_LEGISLACAO;

        document.getElementById('moduloSubtitulo').innerText =
            (modulo === 'def') ? 'Módulo de Direção Defensiva' : 'Módulo de Legislação';

        function abrirDrawer() {
            document.getElementById('drawer-aulas').classList.add('aberto');
            document.getElementById('drawer-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function fecharDrawer() {
            document.getElementById('drawer-aulas').classList.remove('aberto');
            document.getElementById('drawer-overlay').style.display = 'none';
            document.body.style.overflow = '';
        }

        function renderizarSidebar() {
            const concluidas = JSON.parse(localStorage.getItem('aulas_concluidas')) || [];
            const idAtual = localStorage.getItem('aula_atual_id');
            const qtdConcluidas = concluidas.filter(id => aulasParaExibir.find(a => a.id === id)).length;
            const porc = aulasParaExibir.length > 0 ? Math.round((qtdConcluidas / aulasParaExibir.length) * 100) : 0;

            ['sidebar-porc','drawer-porc'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = porc + '%';
            });
            setTimeout(() => {
                ['sidebar-barra','drawer-barra'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.style.width = porc + '%';
                });
            }, 100);

            ['lista-aulas','lista-aulas-mobile'].forEach(containerId => {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = '';

                aulasParaExibir.forEach(aula => {
                    const jaFeita = concluidas.includes(aula.id);
                    const isAtiva = idAtual === aula.id;
                    const item = document.createElement('div');
                    item.className = `btn-aula ${isAtiva ? 'active' : ''} ${jaFeita ? 'concluida' : ''}`;
                    item.innerHTML = `
                        <div class="aula-icone">
                            <i class="fas ${jaFeita ? 'fa-check' : (isAtiva ? 'fa-play' : 'fa-circle')}"></i>
                        </div>
                        <strong>${aula.title}</strong>
                    `;
                    item.onclick = () => {
                        localStorage.setItem('aula_atual_id', aula.id);
                        carregarAula(aula);
                        fecharDrawer();
                        renderizarSidebar();
                    };
                    container.appendChild(item);
                });
            });
        }

        function carregarAula(aula) {
            document.getElementById('videoPlaceholder').style.display = 'none';
            const player = document.getElementById('mainVideoPlayer');
            player.style.display = 'block';
            player.src = aula.url;
            document.getElementById('lessonTitle').innerText = aula.title;
            document.getElementById('btnConcluir').style.display = 'block';
            document.getElementById('btnConcluirMobile').style.display = 'block';
        }

        async function concluirAula() {
            const idAtual = localStorage.getItem('aula_atual_id');
            if (!idAtual) return alert("Selecione uma aula primeiro!");
            let concluidas = JSON.parse(localStorage.getItem('aulas_concluidas')) || [];
            if (!concluidas.includes(idAtual)) {
                concluidas.push(idAtual);
                localStorage.setItem('aulas_concluidas', JSON.stringify(concluidas));
                alert("Presença confirmada ✅");
                renderizarSidebar();
                const email = localStorage.getItem('user_email');
                if (email && typeof SHEET_API_URL !== 'undefined') {
                    const totalAulas = CURSO_LEGISLACAO.length + CURSO_DIRECAO.length;
                    const progressoCalc = Math.round((concluidas.length / totalAulas) * 100);
                    fetch(`${SHEET_API_URL}?acao=atualizarProgresso&email=${encodeURIComponent(email)}&progresso=${progressoCalc}`)
                        .catch(e => console.log("Erro de sincronização"));
                }
            } else {
                alert("Você já marcou presença nesta aula.");
            }
        }

        window.addEventListener('DOMContentLoaded', renderizarSidebar);
    </script>
</body>
</html>
