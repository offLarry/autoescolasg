<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Área do Aluno | São Gotardo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>if(!localStorage.getItem('usuario_logado')) window.location.replace('login.html');</script>

    <nav class="navbar">
        <div>Olá, <span id="displayNome" style="color:var(--primary)">Aluno</span></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer;">Sair</button>
    </nav>

    <main style="padding: 40px 5%;">
        <div class="auth-card" style="max-width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <h3>Seu Progresso Teórico</h3>
                <div style="background:var(--bg); height:20px; border-radius:10px; margin:15px 0;">
                    <div id="barraProgressoFill" style="width:0%; height:100%; background:var(--primary); border-radius:10px; transition:0.5s;"></div>
                </div>
                <p>Você concluiu <span id="porcentagemTexto">0%</span> das aulas.</p>
                <a href="cursos.html" class="btn-send" style="display:inline-block; margin-top:15px; text-decoration:none; text-align:center;">Ir para as Aulas</a>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                <h4>Avisos Importantes</h4>
                <p style="font-size:0.9rem; color:var(--text-dim)">Não esqueça de levar seu documento original no dia do exame psicotécnico.</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
