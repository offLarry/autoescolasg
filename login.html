<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Autoescola São Gotardo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" style="margin-bottom: 30px; font-size: 1.4rem; font-weight: 800; text-align: center; color: var(--primary); text-transform: uppercase;">
                LOGIN CFC SÃO GOTARDO
            </div>
            
            <div class="auth-tabs">
                <div class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
                <div class="tab" id="tabRegister" onclick="switchTab('register')">Cadastrar</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div style="position: relative;">
                        <input type="password" id="loginPassword" placeholder="••••••••" required 
                            style="width: 100%; padding-right: 45px;">
                        
                        <button type="button" onclick="togglePassword('loginPassword', 'eyeIcon')" class="btn-eye">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-send">Acessar Plataforma</button>
            </form>

            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="regNome" placeholder="Como quer ser chamado?" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="regEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div style="position: relative;">
                        <input type="password" id="regPassword" placeholder="Crie uma senha" required 
                            style="width: 100%; padding-right: 45px;">
                        
                        <button type="button" onclick="togglePassword('regPassword', 'eyeReg')" class="btn-eye">
                            <i class="fas fa-eye" id="eyeReg"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-send">Criar Minha Conta</button>
            </form>
            
            <p id="authMessage" style="text-align: center; margin-top: 15px; font-size: 0.9rem; min-height: 20px;"></p>
        </div>
    </div>
    <script>
        // Se o usuário já estiver logado, pula a tela de login
        if (localStorage.getItem('usuario_logado') === 'true') {
            window.location.replace('cursoshome.html');
        }
    </script>
    <script src="login.js"></script>
</body>
</html>
