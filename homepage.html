<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autoescola São Gotardo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div style="font-weight:800; color:var(--primary)">CFC SÃO GOTARDO</div>
        <ul class="nav-links">
            <li><a href="#simulador">Preços</a></li>
            <li><a href="login.html" style="background:var(--primary); padding:8px 15px; border-radius:8px;">Área do Aluno</a></li>
        </ul>
    </nav>

    <section style="padding: 80px 5%; text-align: center;">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">Sua CNH começa aqui.</h1>
        <p style="color:var(--text-dim)">Simule o valor da sua habilitação abaixo:</p>
    </section>

    <section id="simulador" style="padding: 20px 5%;">
        <div class="auth-card" style="margin: 0 auto; max-width: 600px;">
            <div class="form-group">
                <label>O que você precisa?</label>
                <select id="tipoProcesso" style="width:100%; padding:10px; border-radius:8px; background:var(--bg); color:white;">
                    <option value="primeira">Primeira Habilitação</option>
                    <option value="adicao">Adição de Categoria</option>
                </select>
            </div>
            <div class="radio-group">
                <label><input type="radio" name="cat" value="A" checked><div class="radio-card">Moto (A)</div></label>
                <label><input type="radio" name="cat" value="B"><div class="radio-card">Carro (B)</div></label>
                <label><input type="radio" name="cat" value="AB"><div class="radio-card">Carro + Moto</div></label>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <h2 id="valorTotal" style="color:var(--primary); font-size: 2.5rem;">R$ 0,00</h2>
                <button onclick="finalizarNoWhats()" class="btn-send" style="background:#25d366; margin-top:15px;">
                    <i class="fab fa-whatsapp"></i> Chamar no WhatsApp
                </button>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
